security:
    password_hashers:
        App\Infrastructure\Security\SecurityUser:
            algorithm: bcrypt
            cost: 13

    providers:
        app_user_provider:
            id: App\Infrastructure\Security\AppUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        api_login:
            pattern: ^/api/login$
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: api_login
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            login_throttling:
                max_attempts: 10
                interval: '1 minute'

        # Firewall API stateless : authentification JWT
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    # Contrôle d'accès global — le granulaire est délégué aux Voters
    access_control:
        - { path: ^/api/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api,            roles: ROLE_USER }

    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]

when@test:
    security:
        password_hashers:
            App\Infrastructure\Security\SecurityUser:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
