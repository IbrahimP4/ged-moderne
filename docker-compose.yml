services:

  # ── PHP 8.4 FPM ──────────────────────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    container_name: ged_php
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app:cached
      - ./var/storage:/app/var/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ged_network

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ged_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - ged_network

  # ── MySQL 8.4 ─────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: ged_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: ged_moderne
      MYSQL_USER: ged_user
      MYSQL_PASSWORD: ged_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ged_network

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: ged_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ged_network

  # ── Meilisearch ───────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: ged_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-change_me_meilisearch_master_key}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - ged_network

  # ── Mailpit (dev SMTP + webmail) ──────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: ged_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - ged_network

  # ── Messenger Worker ──────────────────────────────────────────────────────────
  messenger:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    container_name: ged_messenger
    restart: unless-stopped
    command: php bin/console messenger:consume async --time-limit=3600 -vv
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL}
      MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages
    volumes:
      - .:/app:cached
    depends_on:
      - db
      - redis
    networks:
      - ged_network

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
  db_data:
  redis_data:

###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
  meilisearch_data:

networks:
  ged_network:
    driver: bridge
